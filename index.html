<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVFC Landing Page</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .button {
            background-color: gold;
            border: none;
            color: black;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="MVFC Logo" style="width: 150px; margin-top: 20px;">
    <h1>Official links for MVFC</h1>
    <div>
        <a href="https://www.youtube.com" class="button">YouTube</a>
        <a href="https://www.tiktok.com" class="button">TikTok</a>
        <a href="https://www.instagram.com" class="button">Instagram</a>
    </div>
    <p>Follow the journey</p>
    <button class="button">Upload Your Footage</button>
</body>
</html>
